<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Social Media Automator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full mx-auto p-8">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold mb-2">🚀 Social Media Automator</h1>
      <p class="text-gray-400">Automate your social media posting</p>
    </div>

    <!-- Auth Container -->
    <div class="bg-gray-800 p-8 rounded-lg shadow-2xl">
      <!-- Toggle Tabs -->
      <div class="flex gap-2 mb-6 bg-gray-700 p-1 rounded-lg">
        <button id="signInTab" type="button"
          class="flex-1 py-2 rounded-lg font-bold transition bg-gray-600 text-white cursor-pointer">
          Sign In
        </button>
        <button id="signUpTab" class="flex-1 py-2 rounded-lg font-bold transition text-gray-400 cursor-pointer" type="button">
          Sign Up
        </button>
      </div>

      <!-- Sign In Form -->
      <div id="signInForm">
        <h2 class="text-2xl font-bold mb-6">Welcome Back</h2>

        <!-- Google OAuth Button -->
        <div class="mb-6">
          <button id="signInGoogleBtn"
            class="w-full bg-white hover:bg-gray-100 text-gray-900 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2 shadow-md">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span id="signInGoogleText">Continue with Google</span>
          </button>
        </div>

        <div class="flex items-center gap-4 mb-6">
          <div class="flex-1 border-t border-gray-600"></div>
          <span class="text-gray-400 text-sm">OR</span>
          <div class="flex-1 border-t border-gray-600"></div>
        </div>

        <form id="signInFormElement" class="space-y-4" novalidate>
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" id="signInEmail" required class="w-full p-3 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="you@example.com" autocomplete="email">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2">Password</label>
            <input type="password" id="signInPassword" required class="w-full p-3 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div id="signInError" class="hidden text-red-400 text-sm mt-2"></div>
          <button type="submit" id="signInButton" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">Sign In with Email</button>
        </form>

        <div class="mt-4">
          <a href="#" id="forgotPasswordLink" class="text-sm text-blue-400 hover:text-blue-300">Forgot password?</a>
        </div>

        <div class="mt-4">
          <button id="signInGithubBtnBottom" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-lg font-bold transition flex items-center justify-center gap-2 text-sm">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" /></svg>
            Continue with GitHub
          </button>
        </div>
      </div>

      <!-- Sign Up Form (Hidden) -->
      <div id="signUpForm" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Create Account</h2>
        <div class="mb-6">
          <button id="signUpGoogleBtn" class="w-full bg-white hover:bg-gray-100 text-gray-900 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2 shadow-md">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span id="signUpGoogleText">Sign up with Google</span>
          </button>
        </div>
        <div class="flex items-center gap-4 mb-6">
          <div class="flex-1 border-t border-gray-600"></div>
          <span class="text-gray-400 text-sm">OR</span>
          <div class="flex-1 border-t border-gray-600"></div>
        </div>
        <form id="signUpFormElement" class="space-y-4" novalidate>
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" id="signUpEmail" required class="w-full p-3 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-green-500 outline-none" placeholder="you@example.com" autocomplete="email">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2">Password</label>
            <input type="password" id="signUpPassword" required minlength="6" class="w-full p-3 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-green-500 outline-none" placeholder="••••••••" autocomplete="new-password">
            <p class="text-xs text-gray-400 mt-1">At least 6 characters</p>
          </div>
          <div id="signUpError" class="hidden text-red-400 text-sm mt-2"></div>
          <button type="submit" id="signUpButton" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">Create Account with Email</button>
        </form>
        <div class="mt-4">
          <button id="signUpGithubBtn" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-lg font-bold transition flex items-center justify-center gap-2 text-sm">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" /></svg>
            Sign up with GitHub
          </button>
        </div>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgotPasswordForm" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Reset Password</h2>
        <form id="forgotPasswordFormElement" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" id="forgotEmail" required class="w-full p-3 bg-gray-700 rounded-lg text-white focus:ring-2 focus:ring-purple-500 outline-none" placeholder="you@example.com">
          </div>
          <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg font-bold transition">Send Reset Link</button>
        </form>
        <div class="mt-4">
          <a href="#" id="backToSignInLink" class="text-sm text-blue-400 hover:text-blue-300">← Back to sign in</a>
        </div>
      </div>
    </div>

    <div class="text-center mt-6">
      <a href="/" class="text-gray-400 hover:text-white">← Back to home</a>
    </div>
  </div>

  <div id="errorBanner" class="hidden fixed top-0 left-0 right-0 bg-red-600 text-white p-4 text-center z-50">
    <p id="errorText" class="font-bold"></p>
    <button id="reloadPageBtn" class="underline mt-2 text-sm">Reload Page</button>
  </div>

  <div id="debugConsole" class="hidden fixed bottom-0 left-0 right-0 bg-black bg-opacity-90 text-green-400 p-4 h-48 overflow-y-auto font-mono text-xs z-40 border-t border-green-500 pointer-events-none">
    <div>Debug Console initialized... (Press Ctrl+D to toggle)</div>
  </div>

  <script>
    function logToScreen(msg, type = 'info') { const c = document.getElementById('debugConsole'); if (c) { const l = document.createElement('div'); l.textContent = `[${new Date().toLocaleTimeString()}] ${type.toUpperCase()}: ${msg}`; if (type === 'error') l.style.color = '#ff6b6b'; c.appendChild(l); c.scrollTop = c.scrollHeight; } }
    let debugConsoleVisible = false;
    document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'd') { e.preventDefault(); const c = document.getElementById('debugConsole'); if (c) { debugConsoleVisible = !debugConsoleVisible; c.classList.toggle('hidden', !debugConsoleVisible); } } });
    const originalLog = console.log; const originalError = console.error;
    console.log = function (...args) { originalLog.apply(console, args); if (debugConsoleVisible) logToScreen(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ')); };
    console.error = function (...args) { originalError.apply(console, args); if (debugConsoleVisible) logToScreen(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'error'); };
    window.onerror = function (msg, url, line, col, error) { const e = document.getElementById('errorText'); const b = document.getElementById('errorBanner'); console.error(`Global Error: ${msg} at ${line}:${col}`); if (e && b) { e.textContent = `System Error: ${msg}`; b.classList.remove('hidden'); } return false; };

    // ==========================================
    // SUPABASE CONFIG - Injected by server at runtime
    // SECURITY: Do NOT hardcode credentials here.
    // Set SUPABASE_URL and SUPABASE_ANON_KEY env vars on your hosting platform (Railway).
    // Server should inject window.__SUPABASE_CONFIG__ before serving this file.
    // See SECURITY_CONFIG.md for setup instructions.
    // ==========================================
    const SUPABASE_URL = (window.__SUPABASE_CONFIG__ && window.__SUPABASE_CONFIG__.url) || '';
    const SUPABASE_ANON_KEY = (window.__SUPABASE_CONFIG__ && window.__SUPABASE_CONFIG__.key) || '';

    let supabaseClient;
    function showSystemError(msg) { const e = document.getElementById('errorText'); const b = document.getElementById('errorBanner'); if (e && b) { e.textContent = msg; b.classList.remove('hidden'); } console.error(msg); }
    async function waitForSupabase() { let r = 20; while (typeof supabase === 'undefined' && r > 0) { console.log(`Waiting for Supabase... (${r} retries left)`); await new Promise(res => setTimeout(res, 500)); r--; } return typeof supabase !== 'undefined'; }

    async function handleOAuthCallback() {
      try {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token'); const refreshToken = hashParams.get('refresh_token');
        const error = hashParams.get('error'); const errorDescription = hashParams.get('error_description'); const type = hashParams.get('type');
        if (error) { console.error('OAuth error:', error, errorDescription); if (error === 'signup_disabled' || errorDescription?.includes('already registered')) { showSystemError('An account with this email already exists. Please sign in with your email and password, or use the "Link Google Account" option in settings.'); } else { showSystemError(`OAuth Error: ${errorDescription || error}. Please try again.`); } window.history.replaceState({}, document.title, window.location.pathname); return; }
        if (accessToken && supabaseClient) {
          console.log('OAuth callback detected, processing...'); const { data: existingSession } = await supabaseClient.auth.getSession();
          if (existingSession?.session) { try { await supabaseClient.auth.linkIdentity({ provider: 'google', options: { redirectTo: getRedirectUrl('/dashboard') } }); } catch (e) { console.warn('Link identity failed:', e); } }
          const { data, error: sessionError } = await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
          if (sessionError) { console.error('Error setting OAuth session:', sessionError); showSystemError('Failed to complete sign-in: ' + sessionError.message); window.history.replaceState({}, document.title, window.location.pathname); return; }
          if (data?.session) { try { const storageKey = `sb-${getProjectId()}-auth-token`; localStorage.setItem(storageKey, JSON.stringify(data.session)); localStorage.setItem('supabase.auth.token', data.session.access_token); } catch (e) {} window.history.replaceState({}, document.title, window.location.pathname); window.location.replace(getRedirectUrl('/dashboard')); return; }
        }
      } catch (err) { console.error('Error handling OAuth callback:', err); showSystemError('Error processing sign-in. Please try again.'); window.history.replaceState({}, document.title, window.location.pathname); }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) { showSystemError('Configuration Error: Supabase credentials are missing. Ensure server injects window.__SUPABASE_CONFIG__. See SECURITY_CONFIG.md.'); return; }
        try { new URL(SUPABASE_URL); } catch (e) { showSystemError('Configuration Error: Invalid Supabase URL.'); return; }
        const loaded = await waitForSupabase(); if (!loaded) { showSystemError('Connection Error: Unable to load authentication services.'); return; }
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client initialized');
        if (window.location.hash.includes('access_token') || window.location.hash.includes('error')) { await handleOAuthCallback(); return; }
        try { const { data, error } = await supabaseClient.auth.getSession(); if (!error) console.log('Supabase connection verified'); } catch (e) { console.error('Supabase connection test failed:', e.message); }
        try { localStorage.setItem('sm_supabase_url', SUPABASE_URL); localStorage.setItem('sm_supabase_key', SUPABASE_ANON_KEY); } catch (e) {}
        setTimeout(() => { checkExistingSession(); }, 100);
      } catch (err) { showSystemError('Initialization Error: ' + err.message); }
    });

    function showSignIn() { document.getElementById('signInForm').classList.remove('hidden'); document.getElementById('signUpForm').classList.add('hidden'); document.getElementById('forgotPasswordForm').classList.add('hidden'); document.getElementById('signInTab').classList.add('bg-gray-600','text-white'); document.getElementById('signInTab').classList.remove('text-gray-400'); document.getElementById('signUpTab').classList.remove('bg-gray-600','text-white'); document.getElementById('signUpTab').classList.add('text-gray-400'); }
    function showSignUp() { document.getElementById('signInForm').classList.add('hidden'); document.getElementById('signUpForm').classList.remove('hidden'); document.getElementById('forgotPasswordForm').classList.add('hidden'); document.getElementById('signUpTab').classList.add('bg-gray-600','text-white'); document.getElementById('signUpTab').classList.remove('text-gray-400'); document.getElementById('signInTab').classList.remove('bg-gray-600','text-white'); document.getElementById('signInTab').classList.add('text-gray-400'); }
    function showForgotPassword() { document.getElementById('signInForm').classList.add('hidden'); document.getElementById('signUpForm').classList.add('hidden'); document.getElementById('forgotPasswordForm').classList.remove('hidden'); }

    async function handleSignIn(event) { event.preventDefault(); const errorDiv = document.getElementById('signInError'); if (errorDiv) { errorDiv.classList.add('hidden'); errorDiv.textContent = ''; } if (!supabaseClient) { showSystemError('System not ready.'); return; } const email = document.getElementById('signInEmail')?.value?.trim(); const password = document.getElementById('signInPassword')?.value; if (!email || !password) { if (errorDiv) { errorDiv.textContent = 'Please enter email and password.'; errorDiv.classList.remove('hidden'); } return; } const btn = document.getElementById('signInButton'); const orig = btn?.textContent; try { if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; } const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password }); if (error) throw error; if (!data?.session) throw new Error('No session received.'); try { localStorage.setItem(`sb-${getProjectId()}-auth-token`, JSON.stringify(data.session)); } catch(e){} window.location.href = '/dashboard'; } catch (error) { let msg = error.message || 'Failed to sign in.'; if (errorDiv) { errorDiv.textContent = msg; errorDiv.classList.remove('hidden'); } if (btn) { btn.disabled = false; btn.textContent = orig; } } }

    async function handleSignUp(event) { event.preventDefault(); const errorDiv = document.getElementById('signUpError'); if (errorDiv) { errorDiv.classList.add('hidden'); errorDiv.textContent = ''; } if (!supabaseClient) { showSystemError('System not ready.'); return; } const email = document.getElementById('signUpEmail')?.value?.trim(); const password = document.getElementById('signUpPassword')?.value; if (!email || !password || password.length < 6) { if (errorDiv) { errorDiv.textContent = 'Please enter a valid email and password (6+ chars).'; errorDiv.classList.remove('hidden'); } return; } const btn = document.getElementById('signUpButton'); const orig = btn?.textContent; try { if (btn) { btn.disabled = true; btn.textContent = 'Creating account...'; } const { data, error } = await supabaseClient.auth.signUp({ email, password }); if (error) throw error; if (errorDiv) { errorDiv.textContent = 'Account created! Check your email to verify.'; errorDiv.classList.remove('hidden'); errorDiv.classList.add('text-green-400'); errorDiv.classList.remove('text-red-400'); } setTimeout(() => { showSignIn(); }, 2000); } catch (error) { if (errorDiv) { errorDiv.textContent = error.message; errorDiv.classList.remove('hidden'); errorDiv.classList.remove('text-green-400'); errorDiv.classList.add('text-red-400'); } if (btn) { btn.disabled = false; btn.textContent = orig; } } }

    async function handleForgotPassword(event) { event.preventDefault(); if (!supabaseClient) { showSystemError('System not ready.'); return; } const email = document.getElementById('forgotEmail').value; const btn = event.target.querySelector('button'); const orig = btn.textContent; try { btn.disabled = true; btn.textContent = 'Sending...'; const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/auth' }); if (error) throw error; alert('Password reset link sent! Check your email.'); showSignIn(); } catch (error) { alert('Error: ' + error.message); } finally { btn.disabled = false; btn.textContent = orig; } }

    function getProjectId() { try { return new URL(SUPABASE_URL).hostname.split('.')[0] || 'default'; } catch (e) { return 'default'; } }
    function getRedirectUrl(path) { return window.location.origin + path; }

    async function signInWithGoogle() { if (!supabaseClient) { showSystemError('System not ready.'); return; } try { const sib = document.getElementById('signInGoogleBtn'); const sub = document.getElementById('signUpGoogleBtn'); if (sib) { sib.disabled = true; sib.querySelector('#signInGoogleText').textContent = 'Connecting...'; } if (sub) { sub.disabled = true; sub.querySelector('#signUpGoogleText').textContent = 'Connecting...'; } const { data: { session } } = await supabaseClient.auth.getSession(); if (session) { await supabaseClient.auth.linkIdentity({ provider: 'google', options: { redirectTo: getRedirectUrl('/auth') } }); return; } const { data, error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: getRedirectUrl('/auth'), queryParams: { access_type: 'offline', prompt: 'consent' } } }); if (error) throw error; } catch (error) { const sib = document.getElementById('signInGoogleBtn'); const sub = document.getElementById('signUpGoogleBtn'); if (sib) { sib.disabled = false; sib.querySelector('#signInGoogleText').textContent = 'Continue with Google'; } if (sub) { sub.disabled = false; sub.querySelector('#signUpGoogleText').textContent = 'Sign up with Google'; } alert('Error connecting with Google: ' + error.message); } }

    async function signInWithGithub() { if (!supabaseClient) { showSystemError('System not ready.'); return; } try { const { data, error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: getRedirectUrl('/dashboard') } }); if (error) throw error; } catch (error) { alert('Error connecting with GitHub: ' + error.message); } }

    async function checkExistingSession() { try { if (!supabaseClient) return; const { data: { session }, error } = await supabaseClient.auth.getSession(); if (session && !error) { window.location.replace(getRedirectUrl('/dashboard')); } } catch (err) { console.error('Error checking session:', err); } }

    function attachEventListeners() {
      const sit = document.getElementById('signInTab'); const sut = document.getElementById('signUpTab');
      if (sit) sit.addEventListener('click', showSignIn); if (sut) sut.addEventListener('click', showSignUp);
      const sif = document.getElementById('signInFormElement'); if (sif) sif.addEventListener('submit', handleSignIn);
      const suf = document.getElementById('signUpFormElement'); if (suf) suf.addEventListener('submit', handleSignUp);
      const fpf = document.getElementById('forgotPasswordFormElement'); if (fpf) fpf.addEventListener('submit', handleForgotPassword);
      const sigb = document.getElementById('signInGoogleBtn'); const sugb = document.getElementById('signUpGoogleBtn');
      if (sigb) sigb.addEventListener('click', signInWithGoogle); if (sugb) sugb.addEventListener('click', signInWithGoogle);
      const sighb = document.getElementById('signInGithubBtnBottom'); const sughb = document.getElementById('signUpGithubBtn');
      if (sighb) sighb.addEventListener('click', signInWithGithub); if (sughb) sughb.addEventListener('click', signInWithGithub);
      const fpl = document.getElementById('forgotPasswordLink'); if (fpl) fpl.addEventListener('click', (e) => { e.preventDefault(); showForgotPassword(); });
      const btsi = document.getElementById('backToSignInLink'); if (btsi) btsi.addEventListener('click', (e) => { e.preventDefault(); showSignIn(); });
      const rpb = document.getElementById('reloadPageBtn'); if (rpb) rpb.addEventListener('click', () => { window.location.reload(); });
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', attachEventListeners); } else { attachEventListeners(); }
  </script>
</body>
</html>
