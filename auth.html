<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Social Media Automator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0b;
      --bg-card: #111113;
      --bg-input: #18181b;
      --bg-hover: #1f1f23;
      --accent: #22d3ee;
      --accent-hover: #06b6d4;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --error: #f87171;
      --success: #34d399;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(34, 211, 238, 0.03), transparent 70%);
      pointer-events: none;
    }

    ::selection { background: rgba(34, 211, 238, 0.25); color: var(--text); }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { color: var(--accent); }

    .logo-text {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 22px;
      color: var(--text);
    }

    /* Card */
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      padding: 4px;
      border-radius: var(--radius-sm);
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      color: var(--text-muted);
    }

    .tab.active {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tab:hover:not(.active) { color: var(--text-secondary); }

    /* Headings */
    .auth-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 28px;
      margin-bottom: 24px;
    }

    /* OAuth buttons */
    .oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 0;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
    }

    .oauth-google {
      background: #fff;
      color: #1f2937;
    }
    .oauth-google:hover { background: #f3f4f6; }
    .oauth-google:disabled { opacity: 0.6; cursor: not-allowed; }

    .oauth-github {
      background: var(--bg-input);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .oauth-github:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-hover); }

    .oauth-btn svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent); }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Error / Success messages */
    .form-message {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      display: none;
    }
    .form-message.error {
      display: block;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--error);
    }
    .form-message.success {
      display: block;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: var(--success);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: var(--bg);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 20px rgba(34, 211, 238, 0.15); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Links */
    .text-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .text-link:hover { text-decoration: underline; }

    .form-footer { margin-top: 16px; }

    /* Back to home */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-secondary); }

    /* Error banner */
    .error-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(248, 113, 113, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 16px;
      text-align: center;
      z-index: 50;
      font-size: 14px;
      font-weight: 500;
    }
    .error-banner button {
      background: none;
      border: none;
      color: white;
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      margin-top: 4px;
      font-family: inherit;
    }

    /* Hidden utility */
    .hidden { display: none !important; }

    /* Debug console */
    .debug-console {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      color: #34d399;
      padding: 12px 16px;
      height: 180px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      z-index: 40;
      border-top: 1px solid rgba(52, 211, 153, 0.3);
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .auth-card { padding: 24px; }
      .auth-title { font-size: 24px; }
      .logo { margin-bottom: 32px; }
    }
  </style>
</head>

<body>

    <!-- Logo -->

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

            </svg>
            Continue with GitHub

        </div>

        <div class="divider"><span>or</span></div>

        <form id="signInFormElement" novalidate>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="signInEmail" required class="form-input" placeholder="you@example.com" autocomplete="email">

          <div class="form-group">

      <!-- Forgot Password Form -->

  <!-- Error Banner -->

  <!-- Debug Console -->
  <div id="debugConsole" class="debug-console">
    <div>Debug Console initialized... (Press Ctrl+D to toggle)</div>
  </div>

  <script>
    // Debug logger
    function logToScreen(msg, type = 'info') {
      const consoleDiv = document.getElementById('debugConsole');
      if (consoleDiv) {
        const line = document.createElement('div');
        line.textContent = `[${new Date().toLocaleTimeString()}] ${type.toUpperCase()}: ${msg}`;
        if (type === 'error') line.style.color = '#f87171';
        consoleDiv.appendChild(line);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
      }
    }

    // Toggle debug console with Ctrl+D
    let debugConsoleVisible = false;
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'd') {
        e.preventDefault();
        const consoleDiv = document.getElementById('debugConsole');
        if (consoleDiv) {
          debugConsoleVisible = !debugConsoleVisible;
          consoleDiv.style.display = debugConsoleVisible ? 'block' : 'none';
        }
      }
    });

    const originalLog = console.log;
    const originalError = console.error;
    console.log = function (...args) {
      originalLog.apply(console, args);
      if (debugConsoleVisible) logToScreen(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
    };
    console.error = function (...args) {
      originalError.apply(console, args);
      if (debugConsoleVisible) logToScreen(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'error');
    };

    window.onerror = function (msg, url, line, col, error) {
      const errorText = document.getElementById('errorText');
      const banner = document.getElementById('errorBanner');
      console.error(`Global Error: ${msg} at ${line}:${col}`);
      if (errorText && banner) {
        errorText.textContent = `System Error: ${msg}`;
        banner.style.display = 'block';
      }
      return false;
    };

    // Supabase
    const SUPABASE_URL = 'https://gzchblilbthkfuxqhoyo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6Y2hibGlsYnRoa2Z1eHFob3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEzMDgzOTcsImV4cCI6MjA3Njg4NDM5N30.h85XUXsVvxYAdMA9odgO4W5RN1148MDOO86XhwgOnb8';
    let supabaseClient;

    function showSystemError(msg) {
      const errorText = document.getElementById('errorText');
      const banner = document.getElementById('errorBanner');
      if (errorText && banner) { errorText.textContent = msg; banner.style.display = 'block'; }
      console.error(msg);
    }

    async function waitForSupabase() {
      let retries = 20;
      while (typeof supabase === 'undefined' && retries > 0) {
        console.log(`Waiting for Supabase... (${retries} retries left)`);
        await new Promise(resolve => setTimeout(resolve, 500));
        retries--;
      }
      return typeof supabase !== 'undefined';
    }

    async function handleOAuthCallback() {
      try {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const error = hashParams.get('error');
        const errorDescription = hashParams.get('error_description');
        const type = hashParams.get('type');

        if (error) {
          console.error('OAuth error:', error, errorDescription);
          if (error === 'signup_disabled' || errorDescription?.includes('already registered')) {
            showSystemError('An account with this email already exists. Please sign in with your email and password.');
          } else {
            showSystemError(`OAuth Error: ${errorDescription || error}. Please try again.`);
          }
          window.history.replaceState({}, document.title, window.location.pathname);
          return;
        }

        if (accessToken && supabaseClient) {
          console.log('OAuth callback detected, processing...');
          const { data: existingSession } = await supabaseClient.auth.getSession();
          if (existingSession?.session) {
            try {
              await supabaseClient.auth.linkIdentity({ provider: 'google', options: { redirectTo: getRedirectUrl('/dashboard') } });
            } catch (linkErr) { console.warn('Link identity attempt failed:', linkErr); }
          }

          const { data, error: sessionError } = await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
          if (sessionError) {
            if (sessionError.message?.includes('already registered')) {
              showSystemError('An account with this email already exists. Please sign in with email and password first.');
            } else {
              showSystemError('Failed to complete sign-in: ' + sessionError.message);
            }
            window.history.replaceState({}, document.title, window.location.pathname);
            return;
          }

          if (data?.session) {
            try {
              const storageKey = `sb-${getProjectId()}-auth-token`;
              localStorage.setItem(storageKey, JSON.stringify(data.session));
              localStorage.setItem('supabase.auth.token', data.session.access_token);
            } catch (e) {}
            window.history.replaceState({}, document.title, window.location.pathname);
            window.location.replace(getRedirectUrl('/dashboard'));
            return;
          } else {
            showSystemError('Failed to establish session. Please try signing in again.');
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        }
      } catch (err) {
        console.error('Error handling OAuth callback:', err);
        showSystemError('Error processing sign-in. Please try again.');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) { showSystemError('Configuration Error: Supabase credentials missing.'); return; }
        try { new URL(SUPABASE_URL); } catch (e) { showSystemError('Configuration Error: Invalid Supabase URL.'); return; }

        const loaded = await waitForSupabase();
        if (!loaded) { showSystemError('Connection Error: Unable to load authentication services.'); return; }

        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client initialized');

        if (window.location.hash.includes('access_token') || window.location.hash.includes('error')) {
          await handleOAuthCallback();
          return;
        }

        try {
          const { data, error } = await supabaseClient.auth.getSession();
          if (!error) console.log('Supabase connection verified');
        } catch (e) { console.warn('Supabase connection test:', e.message); }

        try {
          localStorage.setItem('sm_supabase_url', SUPABASE_URL);
          localStorage.setItem('sm_supabase_key', SUPABASE_ANON_KEY);
        } catch (e) {}

        setTimeout(() => checkExistingSession(), 100);
      } catch (err) {
        showSystemError('Initialization Error: ' + err.message);
      }
    });

    // Form toggles
    function showSignIn() {
      document.getElementById('signInForm').classList.remove('hidden');
      document.getElementById('signUpForm').classList.add('hidden');
      document.getElementById('forgotPasswordForm').classList.add('hidden');
      document.getElementById('signInTab').classList.add('active');
      document.getElementById('signUpTab').classList.remove('active');
    }

    function showSignUp() {
      document.getElementById('signInForm').classList.add('hidden');
      document.getElementById('signUpForm').classList.remove('hidden');
      document.getElementById('forgotPasswordForm').classList.add('hidden');
      document.getElementById('signUpTab').classList.add('active');
      document.getElementById('signInTab').classList.remove('active');
    }

    function showForgotPassword() {
      document.getElementById('signInForm').classList.add('hidden');
      document.getElementById('signUpForm').classList.add('hidden');
      document.getElementById('forgotPasswordForm').classList.remove('hidden');
    }

    function showFormError(divId, msg, isSuccess = false) {
      const el = document.getElementById(divId);
      if (!el) return;
      el.textContent = msg;
      el.className = `form-message ${isSuccess ? 'success' : 'error'}`;
    }

    function hideFormError(divId) {
      const el = document.getElementById(divId);
      if (el) { el.className = 'form-message hidden'; el.textContent = ''; }
    }

    // Sign In
    async function handleSignIn(event) {
      event.preventDefault();
      hideFormError('signInError');
      if (!supabaseClient) { showFormError('signInError', 'System not ready. Please reload.'); return; }

      const email = document.getElementById('signInEmail')?.value?.trim();
      const password = document.getElementById('signInPassword')?.value;
      if (!email) { showFormError('signInError', 'Please enter your email.'); return; }
      if (!password) { showFormError('signInError', 'Please enter your password.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFormError('signInError', 'Please enter a valid email.'); return; }

      const btn = document.getElementById('signInButton');
      const orig = btn?.textContent;
      try {
        if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (!data?.session) throw new Error('No session received.');

        try {
          localStorage.setItem(`sb-${getProjectId()}-auth-token`, JSON.stringify(data.session));
          localStorage.setItem('supabase.auth.token', data.session.access_token);
        } catch (e) {}

        window.location.href = '/dashboard';
        setTimeout(() => { if (window.location.pathname !== '/dashboard') window.location.replace('/dashboard'); }, 1000);
      } catch (error) {
        let msg = 'Failed to sign in. Please check your credentials.';
        if (error.message?.includes('Invalid login')) msg = 'Invalid email or password.';
        else if (error.message?.includes('rate limit')) msg = 'Too many attempts. Wait a few minutes.';
        else if (error.message?.includes('Network')) msg = 'Network error. Check your connection.';
        else if (error.message) msg = error.message;
        showFormError('signInError', msg);
        if (btn) { btn.disabled = false; btn.textContent = orig; }
      }
    }

    // Sign Up
    async function handleSignUp(event) {
      event.preventDefault();
      hideFormError('signUpError');
      if (!supabaseClient) { showFormError('signUpError', 'System not ready. Please reload.'); return; }

      const email = document.getElementById('signUpEmail')?.value?.trim();
      const password = document.getElementById('signUpPassword')?.value;
      if (!email) { showFormError('signUpError', 'Please enter your email.'); return; }
      if (!password) { showFormError('signUpError', 'Please enter a password.'); return; }
      if (password.length < 6) { showFormError('signUpError', 'Password must be at least 6 characters.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFormError('signUpError', 'Please enter a valid email.'); return; }

      const btn = document.getElementById('signUpButton');
      const orig = btn?.textContent;
      try {
        if (btn) { btn.disabled = true; btn.textContent = 'Creating account...'; }
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) throw error;
        showFormError('signUpError', 'Account created! Check your email to verify.', true);
        setTimeout(() => showSignIn(), 2000);
      } catch (error) {
        let msg = 'Failed to create account.';
        if (error.message?.includes('already registered')) msg = 'Account already exists. Please sign in.';
        else if (error.message?.includes('Password')) msg = 'Password too weak. Use at least 6 characters.';
        else if (error.message) msg = error.message;
        showFormError('signUpError', msg);
        if (btn) { btn.disabled = false; btn.textContent = orig; }
      }
    }

    // Forgot Password
    async function handleForgotPassword(event) {
      event.preventDefault();
      if (!supabaseClient) { showSystemError('System not ready.'); return; }
      const email = document.getElementById('forgotEmail').value;
      const btn = event.target.querySelector('button');
      const orig = btn.textContent;
      try {
        btn.disabled = true; btn.textContent = 'Sending...';
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/auth' });
        if (error) throw error;
        alert('Reset link sent! Check your email.');
        showSignIn();
      } catch (error) { alert('Error: ' + error.message); }
      finally { btn.disabled = false; btn.textContent = orig; }
    }

    function getProjectId() {
      try { return new URL(SUPABASE_URL).hostname.split('.')[0]; } catch (e) { return 'default'; }
    }

    function getRedirectUrl(path) { return window.location.origin + path; }

    // Google OAuth
    async function signInWithGoogle() {
      if (!supabaseClient) { showSystemError('System not ready.'); return; }
      try {
        const signInBtn = document.getElementById('signInGoogleBtn');
        const signUpBtn = document.getElementById('signUpGoogleBtn');
        if (signInBtn) { signInBtn.disabled = true; document.getElementById('signInGoogleText').textContent = 'Connecting...'; }
        if (signUpBtn) { signUpBtn.disabled = true; document.getElementById('signUpGoogleText').textContent = 'Connecting...'; }

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          await supabaseClient.auth.linkIdentity({ provider: 'google', options: { redirectTo: getRedirectUrl('/auth') } });
          return;
        }

        const { data, error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: getRedirectUrl('/auth'), queryParams: { access_type: 'offline', prompt: 'consent' } }
        });
        if (error) throw error;
      } catch (error) {
        const signInBtn = document.getElementById('signInGoogleBtn');
        const signUpBtn = document.getElementById('signUpGoogleBtn');
        if (signInBtn) { signInBtn.disabled = false; document.getElementById('signInGoogleText').textContent = 'Continue with Google'; }
        if (signUpBtn) { signUpBtn.disabled = false; document.getElementById('signUpGoogleText').textContent = 'Sign up with Google'; }
        let msg = 'Error connecting with Google: ' + error.message;
        if (error.message?.includes('already registered')) msg = 'Account already exists. Sign in with email first.';
        alert(msg);
      }
    }

    // GitHub OAuth
    async function signInWithGithub() {
      if (!supabaseClient) { showSystemError('System not ready.'); return; }
      try {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: getRedirectUrl('/dashboard') } });
        if (error) throw error;
      } catch (error) { alert('Error connecting with GitHub: ' + error.message); }
    }

    // Check existing session
    async function checkExistingSession() {
      try {
        if (!supabaseClient) return;
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        if (session && !error) { window.location.replace(getRedirectUrl('/dashboard')); }
      } catch (err) { console.error('Session check error:', err); }
    }

    // Attach event listeners
    function attachEventListeners() {
      document.getElementById('signInTab')?.addEventListener('click', showSignIn);
      document.getElementById('signUpTab')?.addEventListener('click', showSignUp);
      document.getElementById('signInFormElement')?.addEventListener('submit', handleSignIn);
      document.getElementById('signUpFormElement')?.addEventListener('submit', handleSignUp);
      document.getElementById('forgotPasswordFormElement')?.addEventListener('submit', handleForgotPassword);
      document.getElementById('signInGoogleBtn')?.addEventListener('click', signInWithGoogle);
      document.getElementById('signUpGoogleBtn')?.addEventListener('click', signInWithGoogle);
      document.getElementById('signInGithubBtnBottom')?.addEventListener('click', signInWithGithub);
      document.getElementById('signUpGithubBtn')?.addEventListener('click', signInWithGithub);
      document.getElementById('forgotPasswordLink')?.addEventListener('click', (e) => { e.preventDefault(); showForgotPassword(); });
      document.getElementById('backToSignInLink')?.addEventListener('click', (e) => { e.preventDefault(); showSignIn(); });
      document.getElementById('reloadPageBtn')?.addEventListener('click', () => window.location.reload());
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', attachEventListeners);
    else attachEventListeners();
  </script>
</body>

</html>
